<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>도파민때문에</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./styles.css" />
  <script src="libraries/p5.min.js"></script>
  <script src="libraries/p5.sound.min.js"></script>
</head>

<body>
  <div id="p5_loading" class="loading-screen">
    <div class="loading-mark">도파민때문에</div>
    <div class="loading-copy">로딩중</div>
    <div class="loading-bar" aria-hidden="true">
      <span></span>
    </div>
  </div>

  <div id="nameOverlay" class="name-overlay" hidden>
    <section class="name-card" id="nameEntry">
      <h1>너의 이름은?</h1>
      <p>[이름은 최대 6자 까지 가능합니다]</p>
      <input id="playerNameInput" maxlength="6" autocomplete="off" placeholder="이름을 입력하지 않을시&#10;[ 현수 ] 로 자동 설정 됩니다" />
      <button id="nameNextButton" type="button">확인</button>
    </section>

    <section class="name-card confirm-card" id="nameConfirm" hidden>
      <h1 id="nameConfirmText">당신의 이름은 [현수](이)가 맞습니까?</h1>
      <p>(이후 이름은 변경이 불가능 합니다.)</p>
      <div class="name-actions">
        <button id="nameConfirmButton" type="button">결정</button>
        <button id="nameCancelButton" type="button">취소</button>
      </div>
    </section>
  </div>

  <script src="./config.js"></script>
  <script src="./story-data-excel.js"></script>
  <script src="./story-validator.js"></script>
  <script src="./libraries/korean-josa.js"></script>
  <script src="./ui.js"></script>
  <script src="./sub_games/breakblocks.js"></script>
  <script src="./sub_games/shooting.js"></script>
  <script src="./game.js"></script>
  <script src="./sketch.js"></script>
</body>

</html>
